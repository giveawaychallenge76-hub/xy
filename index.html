<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Happy Birthday x! 🎂</title>  
<style>  
*{ margin:0; padding:0; box-sizing:border-box; }

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(rgba(255, 214, 223, 0.4), rgba(244, 165, 181, 0.4)), 
            url('1000076281.jpg') no-repeat center center;
background-size: cover;
font-family:Georgia, serif;
}

/* HEARTS BACKGROUND */
#hearts{ position:fixed; inset:0; pointer-events:none; z-index: 1; }
.heart{
position:absolute; bottom:-100px; opacity:0;
animation:floatUp linear infinite;
}
.heart::before,.heart::after{
content:''; position:absolute;
width:50%; height:80%; background:currentColor;
border-radius:50% 50% 0 0;
}
.heart::before{ left:50%; transform-origin:left bottom; transform:rotate(-45deg); }
.heart::after{  left:0;   transform-origin:right bottom; transform:rotate(45deg); }
@keyframes floatUp{
0%  { transform:translateY(0); opacity:0; }
10% { opacity:.8; }
100%{ transform:translateY(-120vh) translateX(40px) rotate(20deg); opacity:0; }
}

/* ── CELEBRATION CONFETTI ENGINE ── */
.confetti-particle {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 3px;
  pointer-events: none;
  z-index: 99;
  animation: explodeDrop 3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
@keyframes explodeDrop {
  0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
  30% { opacity: 1; }
  100% { transform: translate(var(--x-move), var(--y-move)) rotate(var(--rot)) scale(0.3); opacity: 0; }
}

/* ── FRONT PAGE ── */
#front-page {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 20;
  background: linear-gradient(rgba(255, 214, 223, 0.45), rgba(244, 165, 181, 0.45)), 
              url('1000076281.jpg') no-repeat center center;
  background-size: cover;
  transition: opacity 0.6s ease;
}

.proposal-box {
  text-align: center;
  background: rgba(255, 255, 255, 0.92);
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(192, 67, 90, 0.3);
  max-width: 90%;
  width: 360px;
  backdrop-filter: blur(4px);
}

.proposal-box h1 {
  color: #c0435a;
  font-size: 1.6rem;
  margin-bottom: 30px;
}

.btn-container {
  display: flex;
  justify-content: center;
  gap: 25px;
  position: relative;
  height: 50px;
}

.btn {
  padding: 12px 30px;
  font-size: 1rem;
  font-weight: bold;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

#yes-btn {
  background-color: #ff4d6d;
  color: white;
  box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
}
#yes-btn:hover {
  background-color: #ff758f;
}

#no-btn {
  background-color: #f0f0f0;
  color: #555;
  position: absolute;
  left: 190px; 
  transition: all 0.2s ease;
}

/* ── SURPRISE CONTAINER ── */
#surprise-content {
  display: none;
  opacity: 0;
  transition: opacity 0.6s ease;
  flex-direction: column;
  align-items: center;
  z-index: 10;
}

.hint{
text-align:center;
color:#c0435a;
font-size:16px;
margin-bottom:20px;
transition:opacity .4s;
font-weight: bold;
text-shadow: 0 1px 4px rgba(255,255,255,0.8);
background: rgba(255, 255, 255, 0.7);
padding: 5px 15px;
border-radius: 20px;
}
.hint.hidden{ opacity:0; }

/* Envelope Setup */
.envelope{
position:relative;
width:320px;
height:380px; 
cursor:pointer;
animation:bob 3s ease-in-out infinite;
}
.envelope.pulled{ animation:none; }

@keyframes bob{
0%,100%{ transform:translateY(0); }
50%    { transform:translateY(-10px); }
}

.back-flap{
position:absolute;
top:0; left:0;
width:0; height:0;
border-left:  160px solid transparent;
border-right: 160px solid transparent;
border-bottom:130px solid #e5c158;
z-index:1;
}

.body-bg{
position:absolute;
left:0; right:0;
top:130px;
height:250px;
background:#dec168;
z-index:1;
border-radius:0 0 4px 4px;
box-shadow:0 8px 24px rgba(0,0,0,.2);
}

/* ── LETTER CARD ENGINE ── */
.letter{
position:absolute;
left:20px;
right:20px;
height:245px; 
background:#fff;
border-radius:4px;
top:132px; 
z-index:2;
box-shadow:0 4px 15px rgba(0,0,0,.15);
transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1), height 1s cubic-bezier(0.25, 1, 0.5, 1);
overflow:hidden;
transform: translateY(0);
}

.envelope.pulled .letter{
transform:translateY(-215px);
height: 325px; 
}

.content{
height:100%;
display:flex; flex-direction:column;
justify-content:flex-start; align-items:center;
text-align:center; padding:12px;
opacity:0;
transition:opacity 0.6s ease 0.4s;
}
.envelope.pulled .content{ opacity:1; }

.content h2{ 
  color:#c0435a; 
  margin-top: 5px;
  margin-bottom:5px; 
  font-size: 1.5rem; 
  font-weight: normal;
  font-family: 'Dancing Script', 'Brush Script MT', 'Georgia', cursive, serif;
}

.highlight-name {
  background: transparent; 
  padding: 0 4px;
  border: none; 
  font-weight: bold;
  color: #ff4d6d;
  font-size: 1.8rem;
  display: inline-block;
}

.mic-instruction {
  font-size: 0.8rem;
  color: #666;
  font-style: italic;
  margin-bottom: 4px;
}

/* CAKE */
.cake-design {
  position: relative;
  width: 90px;
  height: 45px;
  background: #f48fb1; 
  border-radius: 6px 6px 0 0;
  margin-top: 22px;
  margin-bottom: 12px;
  box-shadow: inset 0 -8px 0 #f06292;
  flex-shrink: 0;
}
.cake-design::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 8px;
  background: #fff8e1; 
  top: 18px; left: 0;
}
.cake-design::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 6px;
  background: #e1bee7; 
  border-radius: 6px 6px 0 0;
  top: 0; left: 0;
}
.candle-wick {
  position: absolute;
  width: 6px;
  height: 18px;
  background: linear-gradient(#b2ebf2, #00bcd4);
  top: -18px;
  left: 42px;
  border-radius: 1px;
}
.candle-wick::before {
  content: "";
  position: absolute;
  width: 2px;
  height: 4px;
  background: #333;
  top: -4px; left: 2px;
}
.glowing-flame {
  position: absolute;
  width: 10px;
  height: 14px;
  background: #ffb74d;
  border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
  top: -32px;
  left: 40px;
  box-shadow: 0 0 10px #ffb74d, 0 0 20px #ff9800;
  animation: flameMove 0.6s ease-in-out infinite alternate;
  transition: opacity 0.3s ease;
}
@keyframes flameMove {
  0% { transform: scale(1) rotate(-3deg); opacity: 0.9; }
  100% { transform: scale(1.15) rotate(4deg); opacity: 1; box-shadow: 0 0 12px #ffb74d, 0 0 22px #ff5722; }
}

.smoke {
  position: absolute;
  width: 12px;
  height: 12px;
  background: rgba(220, 220, 220, 0.8);
  border-radius: 50%;
  top: -36px;
  left: 39px;
  opacity: 0;
  pointer-events: none;
}
.blown-out .glowing-flame {
  opacity: 0 !important;
  animation: none !important;
}
.blown-out .smoke {
  animation: smokeRise 1.5s ease-out forwards;
}
@keyframes smokeRise {
  0% { transform: translateY(0) scale(1); opacity: 0.8; filter: blur(0px); }
  50% { opacity: 0.4; }
  100% { transform: translateY(-30px) scale(2.5); opacity: 0; filter: blur(4px); }
}

/* MEMORY SLIDER DISPLAY SCROLL */
.cute-note-scroll {
  width: 100%;
  background: #fff9f9;
  border: none; 
  border-radius: 8px;
  padding: 8px;
  margin-top: 4px;
  font-family: "Comic Sans MS", "Chalkboard SE", "Comic Neue", sans-serif;
  position: relative;
}
.cute-note-scroll h4 {
  font-size: 0.85rem;
  color: #555;
  margin-bottom: 5px;
  font-weight: normal;
}
.important-list {
  color: #ff4d6d;
  font-weight: bold;
  font-size: 1.05rem;
  line-height: 1.2;
  letter-spacing: 1px;
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.front-pocket{
position:absolute;
left:0; right:0;
top:130px;
bottom:0;
background:#eed070;
z-index:4;
border-radius:0 0 4px 4px;
clip-path: polygon(0 0, 50% 55px, 100% 0, 100% 100%, 0 100%);
display:flex;
justify-content:center;
align-items:center;
}

.front-label{
font-size:18px;
font-weight:bold;
color:#2b2204;
opacity:0.85;
transition:opacity .3s;
text-align:center;
margin-top:45px; 
}
.envelope.pulled .front-label{ opacity:0; }

</style>  
</head>  
<body>  

<audio id="romantic-music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
</audio>
<audio id="birthday-music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div id="hearts"></div>  

<div id="front-page">
    <div class="proposal-box">
        <h1>Is it your birthday?? 🎂</h1>
        <div class="btn-container">
            <button class="btn" id="yes-btn">Yes</button>
            <button class="btn" id="no-btn">No</button>
        </div>
    </div>
</div>

<div id="surprise-content" class="wrap">  
    <div class="hint" id="hint">Tap to pull out the letter 💖</div>  
    
    <div class="envelope" id="envelope">  
        <div class="back-flap"></div>  
        <div class="body-bg"></div>  

        <div class="letter">  
            <div class="content">  
                <h2>Happy Birthday <span class="highlight-name">x!</span> 🥳</h2>  
                <div class="mic-instruction" id="mic-tag">(use the mic to blow the candle)</div>
                
                <div class="cake-design" id="cake-container">
                    <div class="glowing-flame"></div>
                    <div class="candle-wick"></div>
                    <div class="smoke"></div>
                </div>

                <div class="cute-note-scroll" id="note-scroller">
                    <h4 id="note-title">A list of my most important things...</h4>
                    <div class="important-list" id="display-text">
                        YOU<br>YOU<br>YOU❤️
                    </div>
                </div>
            </div>  
        </div>  

        <div class="front-pocket">
            <div class="front-label">Place your hand here</div>  
        </div>
    </div>
</div>  

<script>  
const hearts = document.getElementById("hearts");  
const colors = ["#ff4d6d","#ff758f","#ff8fa3","#ffb3c1","#e84c6a"];  
for(let i = 0; i < 80; i++){  
    const h = document.createElement("span");  
    h.className = "heart";  
    const size = 10 + Math.random()*50;  
    h.style.width  = size+"px";  
    h.style.height = size+"px";  
    h.style.left   = Math.random()*100+"vw";  
    h.style.color  = colors[Math.floor(Math.random()*colors.length)];  
    h.style.animationDuration = 6+Math.random()*10+"s";  
    h.style.animationDelay   = -Math.random()*12+"s";  
    hearts.appendChild(h);  
}  

const romanticMusic = document.getElementById("romantic-music");
const birthdayMusic = document.getElementById("birthday-music");

function startRomanticTrack() {
    romanticMusic.play().catch(e => console.log("Audio initializing..."));
    window.removeEventListener("click", startRomanticTrack);
    window.removeEventListener("touchstart", startRomanticTrack);
}
window.addEventListener("click", startRomanticTrack);
window.addEventListener("touchstart", startRomanticTrack);

const noBtn = document.getElementById("no-btn");
const yesBtn = document.getElementById("yes-btn");
const frontPage = document.getElementById("front-page");
const surpriseContent = document.getElementById("surprise-content");

function escapeNoButton() {
    const padding = 25; 
    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;
    
    const randomX = Math.max(padding, Math.min(maxX, Math.floor(Math.random() * maxX)));
    const randomY = Math.max(padding, Math.min(maxY, Math.floor(Math.random() * maxY)));
    
    noBtn.style.position = "fixed";
    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

noBtn.addEventListener("mouseover", escapeNoButton);
noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); escapeNoButton(); });
noBtn.addEventListener("click", (e) => { e.preventDefault(); escapeNoButton(); });

yesBtn.addEventListener("click", () => {
    yesBtn.innerHTML = "Yay! 🥰";
    romanticMusic.pause();
    birthdayMusic.play().catch(e => console.log("Music handover."));

    setTimeout(() => {
        frontPage.style.opacity = "0";
        setTimeout(() => {
            frontPage.style.display = "none";
            surpriseContent.style.display = "flex";
            setTimeout(() => { surpriseContent.style.opacity = "1"; }, 50);
        }, 600);
    }, 500);
});

const envelope = document.getElementById("envelope");  
const hint     = document.getElementById("hint");  
let letterOpened = false;
  
function toggle(){  
    envelope.classList.toggle("pulled");  
    const isPulled = envelope.classList.contains("pulled");
    hint.classList.toggle("hidden", isPulled);  
    
    if(isPulled && !letterOpened) {
        letterOpened = true;
        setTimeout(initBlowDetection, 1000); 
    }
}  
envelope.addEventListener("click", toggle);  
envelope.addEventListener("touchstart", e => { e.preventDefault(); toggle(); }, {passive:false});  

function initBlowDetection() {
    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
    .then((stream) => {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioContext.createAnalyser();
        const microphone = audioContext.createMediaStreamSource(stream);
        
        analyser.fftSize = 512;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        
        microphone.connect(analyser);

        function checkBlow() {
            if (!letterOpened) return; 
            analyser.getByteFrequencyData(dataArray);
            
            let highFrequencySum = 0;
            for (let i = 0; i < bufferLength; i++) {
                if (i >= bufferLength / 4) highFrequencySum += dataArray[i];
            }
            const highFreqAverage = highFrequencySum / (bufferLength * 0.75);
            
            if (highFreqAverage > 45) { 
                extinguishCandle(stream, audioContext);
                return;
            }
            requestAnimationFrame(checkBlow);
        }
        checkBlow();
    })
    .catch((err) => {
        document.getElementById("mic-tag").innerHTML = "(tap the cake to blow the candle)";
        document.getElementById("cake-container").addEventListener("click", (e) => {
            e.stopPropagation();
            extinguishCandle();
        });
    });
}

// ── NEW ADVANCED ENGAGEMENT FEATURES ──
function triggerConfettiExplosion() {
    const confettiColors = ["#ff4d6d", "#ff758f", "#ffbe0b", "#ff006e", "#8338ec", "#3a86ff", "#00f5d4"];
    
    for (let i = 0; i < 65; i++) {
        const p = document.createElement("div");
        p.className = "confetti-particle";
        p.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
        
        // Emits directly outwards center-screen from behind the envelope position
        p.style.left = "50vw";
        p.style.top = "45vh";
        
        const angle = Math.random() * Math.PI * 2;
        const velocity = 80 + Math.random() * 160;
        
        p.style.setProperty('--x-move', Math.cos(angle) * velocity + 'vw');
        p.style.setProperty('--y-move', (Math.sin(angle) * velocity + 150) + 'vh');
        p.style.setProperty('--rot', Math.floor(Math.random() * 720 - 360) + 'deg');
        
        p.style.animationDelay = (Math.random() * 0.2) + 's';
        p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 3500);
    }
}

function runMemoryNoteCarousel() {
    const memories = [
        { title: "My favorite person in the world...", txt: "Is the one reading this note right now. 🥰" },
        { title: "No matter how much time passes...", txt: "You will always have my whole heart! ❤️" },
        { title: "Your beautiful smile...", txt: "Makes every single day feel worth celebrating. ✨" },
        { title: "Happy Birthday x!", txt: "YOU<br>YOU<br>YOU❤️" }
    ];
    
    let currentIndex = 0;
    const titleEl = document.getElementById("note-title");
    const txtEl = document.getElementById("display-text");
    const scrollerBox = document.getElementById("note-scroller");

    // Makes layout feel interactive & clickable like a button link
    scrollerBox.style.cursor = "pointer";
    titleEl.innerHTML = memories[0].title;
    txtEl.innerHTML = memories[0].txt;

    scrollerBox.addEventListener("click", (e) => {
        e.stopPropagation(); // Avoids closing the letter fold state layout
        
        txtEl.style.opacity = "0";
        titleEl.style.opacity = "0";
        txtEl.style.transform = "scale(0.9)";
        
        setTimeout(() => {
            currentIndex = (currentIndex + 1) % memories.length;
            titleEl.innerHTML = memories[currentIndex].title;
            txtEl.innerHTML = memories[currentIndex].txt;
            
            txtEl.style.opacity = "1";
            titleEl.style.opacity = "1";
            txtEl.style.transform = "scale(1)";
            triggerConfettiExplosion();
        }, 300);
    });
}

function extinguishCandle(stream = null, audioContext = null) {
    const cake = document.getElementById("cake-container");
    const micTag = document.getElementById("mic-tag");
    
    cake.classList.add("blown-out");
    micTag.innerHTML = "✨ Click below to read your wishes! ✨";
    
    triggerConfettiExplosion();
    runMemoryNoteCarousel();
    
    if (stream) stream.getTracks().forEach(track => track.stop());
    if (audioContext) audioContext.close();
}
</script>  
</body>  
</html>
